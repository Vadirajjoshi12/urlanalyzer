```html
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>OnlyGenius</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body {
  background: #020202;
  font-family: 'Geist', sans-serif;
  overflow-x: hidden;
  color: white;
}

/* Animated background */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background:
    radial-gradient(circle at 20% 20%, rgba(0,245,255,0.08), transparent 30%),
    radial-gradient(circle at 80% 30%, rgba(255,0,80,0.05), transparent 30%),
    radial-gradient(circle at 50% 80%, rgba(0,255,150,0.05), transparent 30%);

  filter: blur(80px);

  animation: pulseBg 10s ease-in-out infinite alternate;

  pointer-events: none;
}

@keyframes pulseBg {

  from {
    transform: scale(1);
  }

  to {
    transform: scale(1.08);
  }
}

.glass {

  background: rgba(255,255,255,0.03);

  backdrop-filter: blur(18px);

  border: 1px solid rgba(255,255,255,0.08);

  transition: all 0.35s ease;

  position: relative;

  overflow: hidden;
}

.glass:hover {

  transform: translateY(-6px);

  border-color: rgba(0,245,255,0.35);

  box-shadow:
    0 0 25px rgba(0,245,255,0.18),
    0 0 80px rgba(0,245,255,0.08);
}

/* Cursor glow */
.glass::before {

  content: "";

  position: absolute;

  inset: 0;

  background:
    radial-gradient(
      circle at var(--x) var(--y),
      rgba(0,245,255,0.18),
      transparent 30%
    );

  opacity: 0;

  transition: opacity 0.3s ease;
}

.glass:hover::before {
  opacity: 1;
}

/* Shield animation */
#shield {

  animation: floatShield 4s ease-in-out infinite;

  box-shadow:
    0 0 40px rgba(0,245,255,0.2),
    0 0 100px rgba(0,245,255,0.08);
}

@keyframes floatShield {

  0% {
    transform: translateY(0px);
  }

  50% {
    transform: translateY(-10px);
  }

  100% {
    transform: translateY(0px);
  }
}

/* Button */
#analyzeBtn {

  transition: all 0.25s ease;
}

#analyzeBtn:hover {

  transform: scale(1.08);

  box-shadow:
    0 0 20px rgba(0,245,255,0.45),
    0 0 60px rgba(0,245,255,0.2);
}

#scoreBar {

  transition:
    width 0.8s cubic-bezier(0.22,1,0.36,1),
    background 0.4s ease;
}

/* Grid */
.grid-bento {

  display: grid;

  grid-template-columns: repeat(12, 1fr);

  gap: 1.5rem;
}

/* AI blocks */
.ai-block {

  padding: 18px;

  border-radius: 16px;

  background: rgba(255,255,255,0.02);

  border: 1px solid rgba(255,255,255,0.08);

  transition: all 0.3s ease;
}

.ai-block:hover {

  transform: translateY(-4px);
}

.ai-title {

  font-size: 12px;

  margin-bottom: 10px;

  opacity: 0.7;

  text-transform: uppercase;

  letter-spacing: 0.08em;
}

.ai-why {
  border-left: 3px solid #00F5FF;
}

.ai-risk {
  border-left: 3px solid #FF3B3B;
}

.ai-advice {
  border-left: 3px solid #22c55e;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="h-screen flex flex-col items-center justify-center text-center relative z-10">

<div id="shield"
class="w-40 h-40 mb-6 rounded-2xl glass flex items-center justify-center text-5xl">
🛡️
</div>

<h1 class="text-6xl font-semibold tracking-tight">
OnlyGenius
</h1>

<p class="mt-4 text-white/60 max-w-xl">
Real-time phishing intelligence powered by AI + rule-based detection.
</p>

<div class="mt-8 flex gap-4">

<input
id="urlInput"
placeholder="https://example.com"
class="px-5 py-3 bg-black/40 border border-white/10 rounded-xl w-96 outline-none"
/>

<button
id="analyzeBtn"
onclick="analyze()"
class="px-7 py-3 bg-cyan-400 text-black rounded-xl font-semibold">

Analyze

</button>

</div>

</section>

<!-- RESULTS -->
<section class="px-10 pb-24 grid-bento relative z-10">

<!-- RESULT CARD -->
<div
id="resultCard"
class="glass p-6 col-span-4 hidden">

<h2 class="text-2xl mb-5">
Threat Analysis
</h2>

<div class="mb-4">

<div class="text-sm text-white/60">
Threat Score
</div>

<div id="scoreText"
class="text-5xl font-bold mt-2">
0/100
</div>

<div class="w-full bg-white/10 rounded-full h-3 mt-4">

<div
id="scoreBar"
class="h-3 rounded-full"
style="width:0%">
</div>

</div>

</div>

<div
id="statusBadge"
class="inline-block px-4 py-1 rounded-full text-sm">
</div>

<ul
id="reasonsList"
class="mt-5 text-sm text-white/70 space-y-2">
</ul>

</div>

<!-- AI CARD -->
<div
id="aiCard"
class="glass p-8 col-span-8 hidden">

<h2 class="text-3xl mb-6">
AI Threat Intelligence
</h2>

<div
id="aiStructured"
class="space-y-6">
</div>

</div>

</section>

<script>

/* 3D shield */
document.addEventListener("mousemove", (e) => {

  const shield =
    document.getElementById("shield");

  const x =
    (e.clientY / window.innerHeight) * 30 - 15;

  const y =
    (e.clientX / window.innerWidth) * 30 - 15;

  shield.style.transform =
    `rotateX(${-x}deg) rotateY(${y}deg)`;

});

/* Cursor glow tracking */
document.querySelectorAll(".glass").forEach(card => {

  card.addEventListener("mousemove", e => {

    const rect =
      card.getBoundingClientRect();

    const x =
      e.clientX - rect.left;

    const y =
      e.clientY - rect.top;

    card.style.setProperty("--x", `${x}px`);
    card.style.setProperty("--y", `${y}px`);

  });

});

/* AI formatter */
function formatAI(text) {

  const container =
    document.getElementById("aiStructured");

  container.innerHTML = "";

  const sections = {
    why: [],
    risks: [],
    advice: []
  };

  let current = "";

  text.split("\n").forEach(line => {

    line = line.trim();

    if (!line) return;

    const lower = line.toLowerCase();

    if (lower.startsWith("why")) {
      current = "why";
      return;
    }

    if (lower.startsWith("risks")) {
      current = "risks";
      return;
    }

    if (lower.startsWith("advice")) {
      current = "advice";
      return;
    }

    // REMOVE BULLETS / STARS / DASHES
    line = line
      .replace(/^[-•*]\s*/, "")
      .trim();

    if (current) {
      sections[current].push(line);
    }

  });

  // WHY
  if (sections.why.length) {

    container.innerHTML += `
      <div class="ai-block ai-why">
        <div class="ai-title">WHY</div>
        <div class="space-y-3">
          ${sections.why.map(w =>
            `<p>${w}</p>`
          ).join("")}
        </div>
      </div>
    `;
  }

  // RISKS
  if (sections.risks.length) {

    container.innerHTML += `
      <div class="ai-block ai-risk">
        <div class="ai-title">RISKS</div>
        <ul class="space-y-2">
          ${sections.risks.map(r =>
            `<li>• ${r}</li>`
          ).join("")}
        </ul>
      </div>
    `;
  }

  // ADVICE
  if (sections.advice.length) {

    container.innerHTML += `
      <div class="ai-block ai-advice">
        <div class="ai-title">ADVICE</div>
        <ul class="space-y-2">
          ${sections.advice.map(a =>
            `<li>• ${a}</li>`
          ).join("")}
        </ul>
      </div>
    `;
  }

}

/* Analyze */
async function analyze() {

  const btn =
    document.getElementById("analyzeBtn");

  const url =
    document.getElementById("urlInput").value;

  if (!url) {

    alert("Enter a URL");

    return;
  }

  btn.innerText = "Analyzing...";
  btn.disabled = true;

  document
    .getElementById("resultCard")
    .classList.remove("hidden");

  document
    .getElementById("aiCard")
    .classList.remove("hidden");

  try {

    const res =
      await fetch("/analyze", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        url
      })

    });

    const data =
      await res.json();

    const dangerScore =
      data.danger_score ?? 0;

    document
      .getElementById("scoreText")
      .innerText =
      `${dangerScore}/100`;

    const bar =
      document.getElementById("scoreBar");

    bar.style.width =
      `${dangerScore}%`;

    if (dangerScore >= 70) {

      bar.style.background =
        "#FF3B3B";

    }

    else if (dangerScore >= 45) {

      bar.style.background =
        "#FFA500";

    }

    else {

      bar.style.background =
        "#00F5FF";
    }

    const badge =
      document.getElementById("statusBadge");

    badge.innerText =
      data.status;

    badge.className =
      "inline-block px-4 py-1 rounded-full text-sm";

    if (data.status === "Dangerous") {

      badge.classList.add(
        "bg-red-500/20",
        "text-red-400"
      );

    }

    else {

      badge.classList.add(
        "bg-cyan-400/20",
        "text-cyan-300"
      );
    }

    const reasons =
      document.getElementById("reasonsList");

    reasons.innerHTML = "";

    data.reasons.forEach(reason => {

      reasons.innerHTML +=
        `<li>• ${reason}</li>`;
    });

    formatAI(data.ai_summary);

  }

  catch(err) {

    console.error(err);

    alert("Backend error");

  }

  btn.innerText = "Analyze";
  btn.disabled = false;
}

</script>

</body>
</html>
