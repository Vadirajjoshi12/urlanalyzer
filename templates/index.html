<!DOCTYPE html>

<html lang="en">

<style>
body {
  background: #020202;
  font-family: 'Geist', sans-serif;

.grid-bento {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 1.25rem;
}

/* AI Blocks */
.ai-block {
  padding: 16px;
  border-radius: 12px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.08);
}

.ai-title {
  font-size: 13px;
  margin-bottom: 8px;
  opacity: 0.7;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.ai-why { border-left: 3px solid #00F5FF; }
.ai-risk { border-left: 3px solid #FF3B3B; }
.ai-advice { border-left: 3px solid #22c55e; }
</style>

</head>

<body class="text-white">

<!-- HERO -->

<section class="h-screen flex flex-col items-center justify-center text-center relative z-10">

  <div id="shield"

  </div>

  <h1 class="text-5xl tracking-tighter font-semibold">
    OnlyGenius  
  </h1>

  <p class="mt-4 text-white/60 max-w-xl">
    Real-time phishing intelligence powered by AI + rule-based detection.
  </p>

  <!-- INPUT -->

  <div class="mt-8 flex gap-3">
    <input id="urlInput"
      placeholder="https://example.com"
      class="px-4 py-3 bg-black/40 border border-white/10 rounded-xl w-80 outline-none"/>

```
<button id="analyzeBtn"
  onclick=analyze()

</button>

</section>

<!-- RESULTS -->

<section class="px-10 pb-24 grid-bento relative z-10">

  <!-- RESULT CARD -->

  <div id="resultCard"
    class="glass p-6 col-span-4 row-span-2 hidden">

```
<h2 class="text-xl mb-4 tracking-tighter">Threat Analysis</h2>

<div class="mb-4">
  <div class="text-sm text-white/60">Risk Score</div>
  <div id="scoreText" class="text-3xl font-bold"></div>

  <div class="w-full bg-white/10 rounded-full h-2 mt-2">

</div>

<div id="statusBadge"

  </div>

  <!-- AI CARD -->

```
<h2 class="text-2xl mb-6 tracking-tighter">
  AI Threat Intelligence
</h2>

<div id="aiStructured" class="space-y-6"></div>
```

  </div>

</section>

<script>

/* 3D Shield */
document.addEventListener("mousemove", (e) => {

  const shield = document.getElementById("shield");

  const x = (e.clientY / window.innerHeight) * 30 - 15;
  const y = (e.clientX / window.innerWidth) * 30 - 15;

  shield.style.transform =
    `rotateX(${-x}deg) rotateY(${y}deg)`;

});

/* -----------------------------
   🤖 FORMAT AI OUTPUT
----------------------------- */
function formatAI(text) {

  const container =
    document.getElementById("aiStructured");

  container.innerHTML = "";

  const sections = {
    why: [],
    risks: [],
    advice: []
  };

  let current = "";

  text.split("\n").forEach(line => {

    line = line.trim();

    if (line.toLowerCase().includes("why")) {
      current = "why";
    }

    else if (line.toLowerCase().includes("risk")) {
      current = "risks";
    }

    else if (line.toLowerCase().includes("advice")) {
      current = "advice";
    }

    else if (line.startsWith("•")) {
      sections[current].push(
        line.replace("•", "").trim()
      );
    }

  });

  /* WHY */
  if (sections.why.length) {

    container.innerHTML += `
      <div class="ai-block ai-why">
        <div class="ai-title">Why</div>
        <div>
          ${sections.why.join("<br><br>")}
        </div>
      </div>
    `;
  }

  /* RISKS */
  if (sections.risks.length) {

    container.innerHTML += `
      <div class="ai-block ai-risk">
        <div class="ai-title">Risks</div>

        <ul class="space-y-2">
          ${sections.risks.map(r =>
            `<li>• ${r}</li>`
          ).join("")}
        </ul>
      </div>
    `;
  }

  /* ADVICE */
  if (sections.advice.length) {

    container.innerHTML += `
      <div class="ai-block ai-advice">
        <div class="ai-title">Advice</div>

        <ul class="space-y-2">
          ${sections.advice.map(a =>
            `<li>• ${a}</li>`
          ).join("")}
        </ul>
      </div>
    `;
  }
}

/* -----------------------------
   🚀 ANALYZE
----------------------------- */
async function analyze() {

  const btn =
    document.getElementById("analyzeBtn");

  const url =
    document.getElementById("urlInput").value;

  if (!url) {

    alert("Enter a URL");

    return;
  }

  /* BUTTON STATE */
  btn.innerText = "Analyzing...";
  btn.disabled = true;

  /* SHOW CARDS */
  document
    .getElementById("resultCard")
    .classList.remove("hidden");

  document
    .getElementById("aiCard")
    .classList.remove("hidden");

  /* LOADING TEXT */
  document
    .getElementById("scoreText")
    .innerText = "Analyzing...";

  document
    .getElementById("aiStructured")
    .innerHTML = "Generating insight...";

  try {

    const res = await fetch("/analyze", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        url
      })

    });

    const data = await res.json();

    console.log(data);

    /* -----------------------------
       🎯 SCORES
    ----------------------------- */

    const safeScore =
      data.safe_score ?? 0;

    const dangerScore =
      data.danger_score ?? 0;

    /* SHOW DANGER SCORE */
    document
      .getElementById("scoreText")
      .innerText = `${dangerScore}/100`;

    const bar =
      document.getElementById("scoreBar");

    bar.style.width =
      `${dangerScore}%`;

    /* -----------------------------
       🎨 BAR COLORS
    ----------------------------- */

    if (dangerScore >= 70) {

      bar.style.background =
        "#FF3B3B";

    }

    else if (dangerScore >= 45) {

      bar.style.background =
        "#FFA500";

    }

    else {

      bar.style.background =
        "#00F5FF";

    }

    /* -----------------------------
       🚦 STATUS BADGE
    ----------------------------- */

    const badge =
      document.getElementById("statusBadge");

    badge.innerText =
      data.status;

    badge.className =
      "inline-block px-3 py-1 rounded-full text-sm";

    if (data.status === "Dangerous") {

      badge.classList.add(
        "bg-red-500/20",
        "text-red-400"
      );

    }

    else if (data.status === "Suspicious") {

      badge.classList.add(
        "bg-yellow-400/20",
        "text-yellow-300"
      );

    }

    else {

      badge.classList.add(
        "bg-cyan-400/20",
        "text-cyan-300"
      );

    }

    /* -----------------------------
       📝 REASONS
    ----------------------------- */

    const reasonsList =
      document.getElementById("reasonsList");

    reasonsList.innerHTML = "";

    data.reasons.forEach(reason => {

      const li =
        document.createElement("li");

      li.innerText =
        "• " + reason;

      reasonsList.appendChild(li);

    });

    /* -----------------------------
       🤖 AI OUTPUT
    ----------------------------- */

    formatAI(data.ai_summary);

  }

  catch (err) {

    console.error(err);

    alert(
      "Something went wrong. Check backend."
    );

  }

  /* RESET BUTTON */
  btn.innerText = "Analyze";
  btn.disabled = false;
}

</script>

</body>
</html>
