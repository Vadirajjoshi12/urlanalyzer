<style>
body {
  background: #020202;
  font-family: 'Geist', sans-serif;
}

/* tighter typography */
.tracking-tighter {
  letter-spacing: -0.02em;
}

/* glass system + glow */
.glass {
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  transition: all 0.3s ease;
}

.glass:hover {
  transform: scale(1.01);
}

/* grid */
.grid-bento {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 1.5rem;
}

/* AI blocks */
.ai-block {
  padding: 16px;
  border-radius: 12px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.3s ease;
}

.ai-block:hover {
  box-shadow: 0 0 20px rgba(0,245,255,0.15);
}

.ai-title {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.ai-why { border-left: 3px solid #00F5FF; }
.ai-risk { border-left: 3px solid #FF3B3B; }
.ai-advice { border-left: 3px solid #22c55e; }
</style>

</head>

<script>

/* 3D shield */
document.addEventListener("mousemove", (e) => {
  const shield = document.getElementById("shield");
  const x = (e.clientY / window.innerHeight) * 30 - 15;
  const y = (e.clientX / window.innerWidth) * 30 - 15;
  shield.style.transform = `rotateX(${-x}deg) rotateY(${y}deg)`;
});

/* AI formatter */
function formatAI(text) {
  const container = document.getElementById("aiStructured");
  container.innerHTML = "";

  const sections = { why: [], risks: [], advice: [] };
  let current = "";

  text.split("\n").forEach(line => {
    line = line.trim();
    if (line.toLowerCase().includes("why")) current = "why";
    else if (line.toLowerCase().includes("risk")) current = "risks";
    else if (line.toLowerCase().includes("advice")) current = "advice";
    else if (line.startsWith("•")) {
      sections[current].push(line.replace("•","").trim());
    }
  });

  if (sections.why.length) {
    container.innerHTML += `
      <div class="ai-block ai-why">
        <div class="ai-title">Why</div>
        <div>${sections.why.join("<br><br>")}</div>
      </div>`;
  }

  if (sections.risks.length) {
    container.innerHTML += `
      <div class="ai-block ai-risk">
        <div class="ai-title">Risks</div>
        <ul>${sections.risks.map(r => `<li>• ${r}</li>`).join("")}</ul>
      </div>`;
  }

  if (sections.advice.length) {
    container.innerHTML += `
      <div class="ai-block ai-advice">
        <div class="ai-title">Advice</div>
        <ul>${sections.advice.map(a => `<li>• ${a}</li>`).join("")}</ul>
      </div>`;
  }
}

/* main */
async function analyze() {

  const btn = document.getElementById("analyzeBtn");
  const url = document.getElementById("urlInput").value;

  if (!url) return alert("Enter URL");

  btn.innerText = "Analyzing...";
  btn.disabled = true;

  const resultCard = document.getElementById("resultCard");
  const aiCard = document.getElementById("aiCard");

  resultCard.classList.remove("hidden");
  aiCard.classList.remove("hidden");

  setTimeout(() => {
    resultCard.classList.remove("opacity-0","translate-y-6");
    aiCard.classList.remove("opacity-0","translate-y-6");
  }, 50);

  document.getElementById("scoreText").innerText = "Analyzing...";
  document.getElementById("aiStructured").innerHTML = "Generating insight...";

  try {
    const res = await fetch("/analyze", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ url })
    });

    const data = await res.json();

    document.getElementById("scoreText").innerText = data.score + "/100";

    const bar = document.getElementById("scoreBar");
    bar.style.width = data.score + "%";

    if (data.status === "Safe") bar.style.background = "#00F5FF";
    else if (data.status === "Suspicious") bar.style.background = "#FFA500";
    else bar.style.background = "#FF3B3B";

    const badge = document.getElementById("statusBadge");
    badge.innerText = data.status;
    badge.className = "inline-block px-3 py-1 rounded-full text-sm";

    if (data.status === "Safe")
      badge.classList.add("bg-cyan-400/20","text-cyan-300");
    else if (data.status === "Suspicious")
      badge.classList.add("bg-yellow-400/20","text-yellow-300");
    else
      badge.classList.add("bg-red-500/20","text-red-400");

    const list = document.getElementById("reasonsList");
    list.innerHTML = "";
    data.reasons.forEach(r => {
      const li = document.createElement("li");
      li.innerText = "• " + r;
      list.appendChild(li);
    });

    formatAI(data.ai_summary);

  } catch {
    alert("Backend error");
  }

  btn.innerText = "Analyze";
  btn.disabled = false;
}
</script>

</body>
</html>
